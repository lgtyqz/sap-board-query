<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top 50 Turn 3 Teams - Super Auto Pets</title>
  <link href="view-top50-turn3.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>🐾 Top 50 Strongest Turn 3 Teams</h1>
      <p class="subtitle">Super Auto Pets Board Rankings</p>
      <div class="controls">
        <input type="file" id="jsonInput" accept=".json" />
        <button id="loadBtn">Load JSON</button>
      </div>
    </header>

    <div id="stats" class="stats">
      <span id="teamCount">Teams: 0</span>
    </div>

    <div id="boards" class="boards-grid">
      <!-- Teams will be rendered here -->
    </div>
  </div>

  <script src="view-top50-turn3.js"></script>
</body>
</html>
